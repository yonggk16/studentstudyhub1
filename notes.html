<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Study resources notes">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            corePlugins: {
                preflight: false,
            }
        }
    </script>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="notes.css">

    <title>Notes</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
</head>
<body>
    <script src="home.js" defer></script>
    <script src="userstate.js" defer></script>
    <script src="logout.js" defer></script>
    <script src="notesave.js" defer></script>

    <!-- Navigation bar -->
    <nav class="topnavbar">

        <!-- Home (Left aligned) -->
        <div class="nav-group nav-left">
            <div class="dropdown">
                <a href="home.html">Home <span class="dropdown-arrow">▼</span></a>
                <div class="dropdown-content">
                    <a href="home.html#about">About Us</a>
                    <a href="home.html#features">Features</a>
                    <a href="home.html#contact">Contact Us</a>
                </div>
            </div>
        </div>

        <!-- Study resources, groups and tips (Center aligned) -->
        <div class="nav-group nav-center">
            <div class="dropdown">
                <a class="protected-link" data-href="studyresources.html" href="#">Study Resources <span class="dropdown-arrow">▼</span></a>
                <div class="dropdown-content">
                    <a class="protected-link" data-href="notes.html" href="#">Notes</a>
                    <a class="protected-link" data-href="flashcards.html" href="#">Flashcards</a>
                </div>
            </div>

            <div class="dropdown">
                <a class="protected-link" data-href="studygroups.html" href="#">Study Groups <span class="dropdown-arrow">▼</span></a>
                <div class="dropdown-content">
                    <a class="protected-link" data-href="browsegroups.html" href="#">View Groups</a>
                </div>
            </div>

            <a class="protected-link" data-href="studytips.html" href="#">Study Tips</a>
        </div>

        <!-- My Profile / Account (Right aligned) -->
        <div class="nav-group nav-right">
            
            <!-- Logged in state -->
            <div class="dropdown" id="loggedInMenu" style="display: none;">
                <a href="userprofile.html">My Profile <span class="dropdown-arrow">▼</span></a>
                <div class="dropdown-content">
                    <a href="accountsettings.html">Account Settings</a>
                    <button class="logout-button" onclick="openModal()">Logout</button>
                </div>
            </div>

            <!-- Logged out state -->
            <div class="dropdown" id="loggedOutMenu">
                <a class="protected-link" data-href="#" href="#">Account <span class="dropdown-arrow">▼</span></a>
                <div class="dropdown-content">
                    <a href="login.html">Log In</a>
                    <a href="signup.html">Create Account</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Logout modal -->
    <div class="modal-logout" id="logoutModal">
        <div class="modal-content-logout">
            <p class="p-logout">Are you sure you want to log out?</p>
            <div class="modal-buttons-logout">
                <button class="confirm-button-logout" onclick="logout()">Confirm</button>
                <button class="cancel-button-logout" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Main content -->
    <main class="study-main">

        <!-- Tailwind Notes p -->
        <h1>Notes</h1>
        <p class="text-lg text-gray-600 mb-10">View your saved notes below.</p>

        <div class="sort-bar">
            <label for="sort-notes">Sort by:</label>
            <select id="sort-notes">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
                <option value="az">A to Z</option>
                <option value="za">Z to A</option>
            </select>
        </div>

        <div id="notes-container"></div>
    </main>

</body>
</html>
